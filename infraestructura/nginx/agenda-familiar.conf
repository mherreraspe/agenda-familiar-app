limit_req_zone $binary_remote_addr zone=agenda_autenticacion:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name obusystem.com www.obusystem.com;
    return 301 https://www.obusystem.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name obusystem.com;

    ssl_certificate /etc/letsencrypt/live/obusystem.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/obusystem.com/privkey.pem;

    return 301 https://www.obusystem.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.obusystem.com;

    ssl_certificate /etc/letsencrypt/live/obusystem.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/obusystem.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:AgendaTLS:10m;
    ssl_session_tickets off;

    client_max_body_size 13m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(self), geolocation=(), microphone=()" always;

    location ~ ^/api/v1/autenticacion/(iniciar-sesion|renovar)$ {
        limit_req zone=agenda_autenticacion burst=10 nodelay;
        proxy_pass http://127.0.0.1:8101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/v1/autenticacion/ {
        proxy_pass http://127.0.0.1:8101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/v1/ {
        proxy_pass http://127.0.0.1:8102;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}
