services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-desarrollo-local}
      AUTENTICACION_DB_PASSWORD: ${AUTENTICACION_DB_PASSWORD:-desarrollo-local}
      AGENDA_DB_PASSWORD: ${AGENDA_DB_PASSWORD:-desarrollo-local}
    volumes:
      - postgres_datos:/var/lib/postgresql
      - ./postgres/inicializar-bases.sh:/docker-entrypoint-initdb.d/01-inicializar-bases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    mem_limit: 2g

  autenticacion:
    build:
      context: ..
      dockerfile: servicios/autenticacion/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/autenticacion
      SPRING_DATASOURCE_USERNAME: autenticacion
      SPRING_DATASOURCE_PASSWORD: ${AUTENTICACION_DB_PASSWORD:-desarrollo-local}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET es obligatorio}
      COOKIE_SECURE: "true"
      REFRESH_DURACION_DIAS: "30"
      FAMILIA_TEST_HABILITADA: "true"
      FAMILIA_TEST_PASSWORD: ${FAMILIA_TEST_PASSWORD:?FAMILIA_TEST_PASSWORD es obligatorio}
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=65
    ports:
      - "127.0.0.1:8101:8101"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
    mem_limit: 768m

  archivos-permisos:
    image: alpine:3.22
    restart: "no"
    user: "0:0"
    command: ["sh", "-c", "chown -R 10001:10001 /archivos"]
    volumes:
      - archivos_datos:/archivos

  agenda:
    build:
      context: ..
      dockerfile: servicios/agenda/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agenda_familiar
      SPRING_DATASOURCE_USERNAME: agenda
      SPRING_DATASOURCE_PASSWORD: ${AGENDA_DB_PASSWORD:-desarrollo-local}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET es obligatorio}
      ARCHIVOS_ENCRYPTION_KEY: ${ARCHIVOS_ENCRYPTION_KEY:?ARCHIVOS_ENCRYPTION_KEY es obligatorio}
      ARCHIVOS_RAIZ: /var/lib/agenda-familiar/archivos
      WEB_PUSH_VAPID_PUBLIC_KEY: ${WEB_PUSH_VAPID_PUBLIC_KEY:-}
      WEB_PUSH_VAPID_PRIVATE_KEY: ${WEB_PUSH_VAPID_PRIVATE_KEY:-}
      WEB_PUSH_VAPID_SUBJECT: ${WEB_PUSH_VAPID_SUBJECT:-mailto:administracion@obusystem.com}
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=65
    volumes:
      - archivos_datos:/var/lib/agenda-familiar/archivos
    ports:
      - "127.0.0.1:8102:8102"
    depends_on:
      postgres:
        condition: service_healthy
      archivos-permisos:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1536M
    mem_limit: 1536m

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - autenticacion
      - agenda
    deploy:
      resources:
        limits:
          memory: 128M
    mem_limit: 128m

volumes:
  postgres_datos:
  archivos_datos:
