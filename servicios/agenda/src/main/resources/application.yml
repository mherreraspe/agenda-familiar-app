server:
  port: ${PUERTO_AGENDA:8102}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: servicio-agenda
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agenda_familiar}
    username: ${SPRING_DATASOURCE_USERNAME:agenda}
    password: ${SPRING_DATASOURCE_PASSWORD:desarrollo-local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 12MB
      max-request-size: 12MB
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

seguridad:
  jwt:
    emisor: ${JWT_ISSUER:agenda-familiar-autenticacion}
    secreto: ${JWT_SECRET:desarrollo-local-cambiar-esta-clave-antes-de-produccion-2026}

archivos:
  raiz: ${ARCHIVOS_RAIZ:${java.io.tmpdir}/agenda-familiar-archivos}
  clave: ${ARCHIVOS_ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
